<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Newsletter Registration</title>
    <link rel="stylesheet" href="./assets/css/stylesheet.css">
</head>
<body>
    <div class="container">
        <div class="infos">
            <h1>Stay Updated!</h1>
            <p>Join 60,000+ product managers receiving monthly updates on:</p>
            <ul>
                <li>Product discovery and building what matters</li>
                <li>Measuring to ensure updates are a success</li>
                <li>And much more!</li>
            </ul>
            <form action="#">
                <label for="user-email">Email Address</label>
                <input type="email" class="email-field" id="user-email" placeholder="email@company.com" required autofocus>
                <input type="submit" value="Subscribe to monthly newsletter" class="subscribe-btn">
            </form>
        </div>
        <div class="aside-image">
            <img src="./assets/images/illustration-sign-up-desktop.svg" alt="Ilustracao decorativa">
        </div>
    </div>
</body>
</html>
